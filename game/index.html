<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEADZONE — 3D Shooter</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
#canvas { display: block; width: 100vw; height: 100vh; }

#hud {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}

#crosshair {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 20px; height: 20px;
}
#crosshair::before, #crosshair::after {
  content: ''; position: absolute; background: rgba(255,255,255,0.9);
}
#crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
#crosshair::after { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

#health-bar {
  position: absolute; bottom: 40px; left: 40px;
  display: flex; flex-direction: column; gap: 6px;
}
#health-label { color: #ff4444; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
#health-track {
  width: 180px; height: 6px; background: rgba(255,255,255,0.15);
  border-radius: 3px; overflow: hidden;
}
#health-fill {
  height: 100%; background: linear-gradient(90deg, #ff4444, #ff8800);
  border-radius: 3px; transition: width 0.2s;
  width: 100%;
}

#ammo-display {
  position: absolute; bottom: 40px; right: 40px; text-align: right;
}
#ammo-count { color: #fff; font-size: 36px; font-weight: bold; letter-spacing: -2px; }
#ammo-reserve { color: rgba(255,255,255,0.4); font-size: 14px; letter-spacing: 2px; }
#weapon-name { color: rgba(255,255,255,0.6); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-top: 4px; }

#score-display {
  position: absolute; top: 30px; right: 40px; text-align: right;
}
#score-label { color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 4px; }
#score-value { color: #fff; font-size: 28px; font-weight: bold; }
#wave-display { color: #ff8800; font-size: 11px; letter-spacing: 3px; margin-top: 4px; }

#kill-feed {
  position: absolute; top: 30px; left: 40px;
}
.kill-msg {
  color: #ff4444; font-size: 12px; letter-spacing: 2px;
  animation: fadeKill 2s forwards;
  margin-bottom: 4px;
}
@keyframes fadeKill { 0%{opacity:1;transform:translateX(0)} 80%{opacity:1} 100%{opacity:0;transform:translateX(-20px)} }

#damage-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(255,0,0,0.4) 100%);
  opacity: 0; pointer-events: none; transition: opacity 0.1s;
  z-index: 9;
}

#reload-bar {
  position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
  opacity: 0; transition: opacity 0.2s;
}
#reload-track { width: 120px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; }
#reload-fill { height: 100%; background: #ff8800; border-radius: 2px; width: 0%; transition: width 0.05s linear; }
#reload-text { color: rgba(255,255,255,0.6); font-size: 10px; letter-spacing: 3px; text-align: center; margin-bottom: 6px; }

#start-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.92); display: flex; flex-direction: column;
  align-items: center; justify-content: center; z-index: 100; color: #fff;
}
#start-screen h1 {
  font-size: 72px; font-weight: 900; letter-spacing: 12px;
  color: #fff; text-shadow: 0 0 40px rgba(255,68,68,0.5);
  margin-bottom: 8px;
}
#start-screen .sub { color: rgba(255,255,255,0.4); letter-spacing: 8px; font-size: 13px; margin-bottom: 60px; }
#start-btn {
  background: #ff4444; border: none; color: #fff;
  padding: 16px 48px; font-family: 'Courier New', monospace;
  font-size: 14px; letter-spacing: 4px; cursor: pointer;
  text-transform: uppercase; transition: all 0.2s;
}
#start-btn:hover { background: #ff2222; transform: scale(1.05); }
.controls-hint {
  margin-top: 40px; color: rgba(255,255,255,0.3);
  font-size: 11px; letter-spacing: 2px; line-height: 2;
  text-align: center;
}

#game-over {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.9); display: none; flex-direction: column;
  align-items: center; justify-content: center; z-index: 100; color: #fff;
}
#game-over h2 { font-size: 60px; letter-spacing: 8px; color: #ff4444; }
#final-score { font-size: 24px; color: rgba(255,255,255,0.7); margin: 20px 0; letter-spacing: 4px; }
#restart-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff;
  padding: 14px 40px; font-family: 'Courier New', monospace;
  font-size: 13px; letter-spacing: 4px; cursor: pointer; text-transform: uppercase;
}
#restart-btn:hover { background: rgba(255,255,255,0.1); }

#wave-announce {
  position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
  color: #ff8800; font-size: 32px; letter-spacing: 8px; text-align: center;
  opacity: 0; pointer-events: none;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="damage-overlay"></div>

<div id="hud">
  <div id="crosshair"></div>
  <div id="health-bar">
    <div id="health-label">Health</div>
    <div id="health-track"><div id="health-fill"></div></div>
  </div>
  <div id="ammo-display">
    <div id="ammo-count">30</div>
    <div id="ammo-reserve">/ 120</div>
    <div id="weapon-name">Assault Rifle</div>
  </div>
  <div id="score-display">
    <div id="score-label">Score</div>
    <div id="score-value">0</div>
    <div id="wave-display">WAVE 1</div>
  </div>
  <div id="kill-feed"></div>
  <div id="reload-bar">
    <div id="reload-text">RELOADING</div>
    <div id="reload-track"><div id="reload-fill"></div></div>
  </div>
  <div id="wave-announce"></div>
</div>

<div id="start-screen">
  <h1>DEADZONE</h1>
  <div class="sub">Survival Shooter</div>
  <button id="start-btn">CLICK TO PLAY</button>
  <div class="controls-hint">
    WASD — Move &nbsp;|&nbsp; Mouse — Aim &nbsp;|&nbsp; Click — Shoot<br>
    R — Reload &nbsp;|&nbsp; Shift — Sprint &nbsp;|&nbsp; Enemies get stronger each wave
  </div>
</div>

<div id="game-over">
  <h2>GAME OVER</h2>
  <div id="final-score">SCORE: 0 &nbsp;|&nbsp; WAVE: 1</div>
  <button id="restart-btn">PLAY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.035);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0x111122, 0.8);
scene.add(ambientLight);
const moonLight = new THREE.DirectionalLight(0x3355aa, 0.6);
moonLight.position.set(20, 40, 10);
moonLight.castShadow = true;
moonLight.shadow.mapSize.width = 2048;
moonLight.shadow.mapSize.height = 2048;
moonLight.shadow.camera.near = 0.1;
moonLight.shadow.camera.far = 200;
moonLight.shadow.camera.left = -60;
moonLight.shadow.camera.right = 60;
moonLight.shadow.camera.top = 60;
moonLight.shadow.camera.bottom = -60;
scene.add(moonLight);

// Point lights for atmosphere
for (let i = 0; i < 6; i++) {
  const light = new THREE.PointLight(0xff4400, 2, 20);
  light.position.set(
    (Math.random() - 0.5) * 60,
    3 + Math.random() * 3,
    (Math.random() - 0.5) * 60
  );
  scene.add(light);
}

// Floor
const floorGeo = new THREE.PlaneGeometry(120, 120, 40, 40);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a2e, roughness: 0.9, metalness: 0.1
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Grid lines on floor
const gridHelper = new THREE.GridHelper(120, 60, 0x222244, 0x111133);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Boundary walls (invisible colliders)
const ARENA_SIZE = 55;

// Wall blocks for cover
function makeCover(x, z, w, d, h) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({
    color: 0x2a2a3e, roughness: 0.8, metalness: 0.3
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return { mesh, x, z, w, d, h };
}

const covers = [
  makeCover(10, 0, 4, 1.5, 2),
  makeCover(-10, 5, 1.5, 4, 2),
  makeCover(0, -12, 5, 1.5, 2),
  makeCover(-15, -8, 1.5, 5, 2.5),
  makeCover(18, -15, 4, 1.5, 2),
  makeCover(-20, 15, 5, 1.5, 2),
  makeCover(5, 20, 1.5, 4, 2),
  makeCover(25, 5, 4, 1.5, 2.5),
  makeCover(-25, -5, 1.5, 4, 2),
  makeCover(0, 30, 6, 1.5, 2),
  makeCover(-30, 20, 1.5, 6, 3),
  makeCover(30, -20, 4, 1.5, 2),
];

// Pillars
function makePillar(x, z) {
  const geo = new THREE.CylinderGeometry(0.4, 0.5, 5, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0x333355, roughness: 0.7, metalness: 0.4 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, 2.5, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return { mesh, x, z, w: 1, d: 1, h: 5 };
}

const pillars = [];
for (let i = 0; i < 8; i++) {
  const angle = (i / 8) * Math.PI * 2;
  pillars.push(makePillar(Math.cos(angle) * 30, Math.sin(angle) * 30));
}

const allObstacles = [...covers, ...pillars];

// Skybox-like stars
const starGeo = new THREE.BufferGeometry();
const starCount = 2000;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i * 3] = (Math.random() - 0.5) * 200;
  starPos[i * 3 + 1] = Math.random() * 100 + 10;
  starPos[i * 3 + 2] = (Math.random() - 0.5) * 200;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3 });
scene.add(new THREE.Points(starGeo, starMat));

// Gun model (viewmodel)
const gunGroup = new THREE.Group();
camera.add(gunGroup);
scene.add(camera);

function buildGun() {
  gunGroup.clear();
  const darkMetal = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.3, metalness: 0.9 });
  const lightMetal = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.4, metalness: 0.7 });
  const tan = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8, metalness: 0.1 });

  // Body
  const bodyGeo = new THREE.BoxGeometry(0.06, 0.1, 0.4);
  const body = new THREE.Mesh(bodyGeo, darkMetal);
  body.position.set(0.25, -0.2, -0.5);
  gunGroup.add(body);

  // Barrel
  const barrelGeo = new THREE.CylinderGeometry(0.015, 0.018, 0.5, 8);
  const barrel = new THREE.Mesh(barrelGeo, darkMetal);
  barrel.rotation.x = Math.PI / 2;
  barrel.position.set(0.25, -0.17, -0.75);
  gunGroup.add(barrel);

  // Magazine
  const magGeo = new THREE.BoxGeometry(0.045, 0.15, 0.06);
  const mag = new THREE.Mesh(magGeo, lightMetal);
  mag.position.set(0.25, -0.28, -0.48);
  gunGroup.add(mag);

  // Stock
  const stockGeo = new THREE.BoxGeometry(0.055, 0.08, 0.15);
  const stock = new THREE.Mesh(stockGeo, tan);
  stock.position.set(0.25, -0.21, -0.3);
  gunGroup.add(stock);

  // Sight rail
  const railGeo = new THREE.BoxGeometry(0.03, 0.02, 0.3);
  const rail = new THREE.Mesh(railGeo, lightMetal);
  rail.position.set(0.25, -0.145, -0.55);
  gunGroup.add(rail);

  // Front sight
  const sightGeo = new THREE.BoxGeometry(0.01, 0.03, 0.01);
  const sight = new THREE.Mesh(sightGeo, darkMetal);
  sight.position.set(0.25, -0.13, -0.7);
  gunGroup.add(sight);

  // Muzzle flash point
  const flashPoint = new THREE.Object3D();
  flashPoint.position.set(0.25, -0.17, -1.02);
  flashPoint.name = 'muzzleFlash';
  gunGroup.add(flashPoint);
}
buildGun();

// Muzzle flash
const flashGeo = new THREE.PlaneGeometry(0.2, 0.2);
const flashMat = new THREE.MeshBasicMaterial({
  color: 0xffaa00, transparent: true, opacity: 0, side: THREE.DoubleSide
});
const muzzleFlash = new THREE.Mesh(flashGeo, flashMat);
muzzleFlash.position.set(0.25, -0.17, -1.0);
camera.add(muzzleFlash);

// Particles system
const particles = [];
function createMuzzleParticles() {
  const fp = gunGroup.getObjectByName('muzzleFlash');
  const worldPos = new THREE.Vector3();
  if (fp) fp.getWorldPosition(worldPos);
  for (let i = 0; i < 8; i++) {
    const pGeo = new THREE.SphereGeometry(0.02, 4, 4);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xffcc44 });
    const p = new THREE.Mesh(pGeo, pMat);
    p.position.copy(worldPos);
    const dir = camera.getWorldDirection(new THREE.Vector3());
    p.userData.vel = new THREE.Vector3(
      dir.x + (Math.random() - 0.5) * 0.3,
      dir.y + (Math.random() - 0.5) * 0.3,
      dir.z + (Math.random() - 0.5) * 0.3
    ).multiplyScalar(0.3 + Math.random() * 0.2);
    p.userData.life = 0.15 + Math.random() * 0.1;
    p.userData.age = 0;
    scene.add(p);
    particles.push(p);
  }
}

// Blood/hit particles
function createHitParticles(pos) {
  for (let i = 0; i < 12; i++) {
    const pGeo = new THREE.SphereGeometry(0.03, 4, 4);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xcc0000 });
    const p = new THREE.Mesh(pGeo, pMat);
    p.position.copy(pos);
    p.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 0.4,
      Math.random() * 0.3 + 0.1,
      (Math.random() - 0.5) * 0.4
    );
    p.userData.life = 0.4 + Math.random() * 0.3;
    p.userData.age = 0;
    p.userData.isBlood = true;
    scene.add(p);
    particles.push(p);
  }
}

// Enemy system
const enemies = [];
const ENEMY_TYPES = [
  { name: 'Scout', color: 0xff2200, hp: 60, speed: 0.045, size: 1, score: 100 },
  { name: 'Brute', color: 0x880000, hp: 180, speed: 0.025, size: 1.4, score: 250 },
  { name: 'Runner', color: 0xff6600, hp: 40, speed: 0.07, size: 0.8, score: 150 },
  { name: 'Tank', color: 0x440022, hp: 350, speed: 0.015, size: 1.8, score: 500 },
];

function buildEnemyMesh(type) {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({
    color: type.color, roughness: 0.6, metalness: 0.2, emissive: type.color, emissiveIntensity: 0.2
  });
  const s = type.size;

  // Body
  const bodyGeo = new THREE.BoxGeometry(0.6 * s, 0.8 * s, 0.4 * s);
  const body = new THREE.Mesh(bodyGeo, mat);
  body.position.y = 0.9 * s;
  body.castShadow = true;
  g.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.25 * s, 8, 8);
  const headMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(type.color).multiplyScalar(0.7),
    roughness: 0.5, metalness: 0.1, emissive: type.color, emissiveIntensity: 0.3
  });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 1.5 * s;
  head.castShadow = true;
  g.add(head);

  // Eyes (glowing)
  const eyeGeo = new THREE.SphereGeometry(0.06 * s, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff4400 });
  const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
  eye1.position.set(-0.1 * s, 1.55 * s, 0.22 * s);
  g.add(eye1);
  const eye2 = eye1.clone();
  eye2.position.set(0.1 * s, 1.55 * s, 0.22 * s);
  g.add(eye2);

  // Arms
  const armGeo = new THREE.BoxGeometry(0.18 * s, 0.6 * s, 0.18 * s);
  const arm1 = new THREE.Mesh(armGeo, mat);
  arm1.position.set(-0.45 * s, 0.9 * s, 0);
  arm1.castShadow = true;
  g.add(arm1);
  const arm2 = arm1.clone();
  arm2.position.set(0.45 * s, 0.9 * s, 0);
  g.add(arm2);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.2 * s, 0.5 * s, 0.2 * s);
  const leg1 = new THREE.Mesh(legGeo, mat);
  leg1.position.set(-0.2 * s, 0.25 * s, 0);
  leg1.castShadow = true;
  g.add(leg1);
  const leg2 = leg1.clone();
  leg2.position.set(0.2 * s, 0.25 * s, 0);
  g.add(leg2);

  // Health bar (billboard)
  const hbGeo = new THREE.PlaneGeometry(0.8 * s, 0.08 * s);
  const hbMat = new THREE.MeshBasicMaterial({ color: 0x00ff44, side: THREE.DoubleSide });
  const hb = new THREE.Mesh(hbGeo, hbMat);
  hb.position.y = 2.0 * s;
  hb.name = 'healthBar';
  g.add(hb);

  const hbBgGeo = new THREE.PlaneGeometry(0.8 * s, 0.08 * s);
  const hbBgMat = new THREE.MeshBasicMaterial({ color: 0x330000, side: THREE.DoubleSide });
  const hbBg = new THREE.Mesh(hbBgGeo, hbBgMat);
  hbBg.position.y = 2.0 * s;
  hbBg.position.z = -0.01;
  g.add(hbBg);

  return g;
}

function spawnEnemy(wave) {
  const typeIdx = Math.min(Math.floor(Math.random() * Math.min(wave, ENEMY_TYPES.length)), ENEMY_TYPES.length - 1);
  const type = ENEMY_TYPES[typeIdx];
  const angle = Math.random() * Math.PI * 2;
  const dist = 35 + Math.random() * 15;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;

  const mesh = buildEnemyMesh(type);
  mesh.position.set(x, 0, z);
  scene.add(mesh);

  const maxHp = type.hp + wave * 15;
  enemies.push({
    mesh,
    type,
    hp: maxHp,
    maxHp,
    speed: type.speed + wave * 0.002,
    scoreValue: type.score + wave * 20,
    walkCycle: Math.random() * Math.PI * 2,
    attackCooldown: 0,
    isAlive: true,
  });
}

// Bullet decals / trails
const bulletTrails = [];
function createBulletTrail(from, to) {
  const dir = new THREE.Vector3().subVectors(to, from);
  const len = dir.length();
  const geo = new THREE.CylinderGeometry(0.01, 0.01, len, 4);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffee88, transparent: true, opacity: 0.6 });
  const trail = new THREE.Mesh(geo, mat);
  trail.position.copy(from).lerp(to, 0.5);
  trail.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
  trail.userData.life = 0.1;
  scene.add(trail);
  bulletTrails.push(trail);
}

// Game state
let gameState = 'start';
let playerHp = 100;
let score = 0;
let wave = 1;
let ammo = 30;
let reserveAmmo = 120;
let isReloading = false;
let reloadTime = 0;
const RELOAD_DURATION = 2.0;
let gunRecoil = 0;
let gunBob = 0;
let gunSway = 0;
let shootCooldown = 0;
const FIRE_RATE = 0.1;
let waveEnemiesLeft = 0;
let waveEnemiesSpawned = 0;
let waveSpawnTimer = 0;
let waveTotal = 0;
let waveComplete = false;

// Player movement
const keys = {};
let yaw = 0;
let pitch = 0;
let velocity = new THREE.Vector3();
let isLocked = false;
let sprintFactor = 1;

document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

document.addEventListener('keydown', e => {
  if (e.code === 'KeyR' && !isReloading && ammo < 30 && reserveAmmo > 0 && gameState === 'playing') {
    startReload();
  }
});

canvas.addEventListener('click', () => {
  if (gameState === 'playing' && !isLocked) {
    canvas.requestPointerLock();
  }
});

document.addEventListener('pointerlockchange', () => {
  isLocked = document.pointerLockElement === canvas;
});

document.addEventListener('mousemove', e => {
  if (!isLocked || gameState !== 'playing') return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
});

document.addEventListener('mousedown', e => {
  if (e.button === 0 && gameState === 'playing' && isLocked) shoot();
});

function shoot() {
  if (isReloading || ammo <= 0 || shootCooldown > 0) return;
  if (ammo === 0) { startReload(); return; }

  ammo--;
  shootCooldown = FIRE_RATE;
  gunRecoil = 0.08;

  // Muzzle flash
  flashMat.opacity = 0.9;
  setTimeout(() => { flashMat.opacity = 0; }, 60);
  createMuzzleParticles();

  // Raycast
  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

  // Check enemies
  const enemyMeshes = enemies.filter(e => e.isAlive).map(e => e.mesh);
  const allChildren = enemyMeshes.flatMap(m => {
    const kids = [];
    m.traverse(c => { if (c.isMesh) kids.push(c); });
    return kids;
  });

  const hits = raycaster.intersectObjects(allChildren, false);
  if (hits.length > 0) {
    const hit = hits[0];
    // Find which enemy
    let hitEnemy = null;
    for (const en of enemies) {
      let found = false;
      en.mesh.traverse(c => { if (c === hit.object) found = true; });
      if (found) { hitEnemy = en; break; }
    }
    if (hitEnemy && hitEnemy.isAlive) {
      const dmg = 25 + Math.random() * 15;
      hitEnemy.hp -= dmg;
      createHitParticles(hit.point);

      // Update health bar
      const hb = hitEnemy.mesh.getObjectByName('healthBar');
      if (hb) {
        const ratio = Math.max(0, hitEnemy.hp / hitEnemy.maxHp);
        hb.scale.x = ratio;
        hb.position.x = -(1 - ratio) * 0.4 * hitEnemy.type.size;
        hb.material.color.setHex(ratio > 0.5 ? 0x00ff44 : ratio > 0.25 ? 0xffaa00 : 0xff2200);
      }

      if (hitEnemy.hp <= 0) killEnemy(hitEnemy);
    }
    createBulletTrail(raycaster.ray.origin.clone(), hit.point);
  } else {
    const far = raycaster.ray.origin.clone().add(
      raycaster.ray.direction.clone().multiplyScalar(80)
    );
    createBulletTrail(raycaster.ray.origin.clone(), far);
  }

  updateHUD();
}

function killEnemy(en) {
  en.isAlive = false;
  score += en.scoreValue;
  waveEnemiesLeft--;

  createHitParticles(en.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)));

  // Death animation - fall down
  en.mesh.userData.dying = true;
  en.mesh.userData.dyingTimer = 0;

  addKillFeed(en.type.name);
  updateHUD();

  // Remove after delay
  setTimeout(() => {
    scene.remove(en.mesh);
    const idx = enemies.indexOf(en);
    if (idx !== -1) enemies.splice(idx, 1);
  }, 800);
}

function addKillFeed(name) {
  const feed = document.getElementById('kill-feed');
  const msg = document.createElement('div');
  msg.className = 'kill-msg';
  msg.textContent = `✕ ${name} eliminated`;
  feed.appendChild(msg);
  setTimeout(() => feed.removeChild(msg), 2000);
}

function startReload() {
  if (reserveAmmo <= 0 || ammo === 30) return;
  isReloading = true;
  reloadTime = 0;
  document.getElementById('reload-bar').style.opacity = '1';
}

function finishReload() {
  const needed = 30 - ammo;
  const take = Math.min(needed, reserveAmmo);
  ammo += take;
  reserveAmmo -= take;
  isReloading = false;
  document.getElementById('reload-bar').style.opacity = '0';
  document.getElementById('reload-fill').style.width = '0%';
  updateHUD();
}

function takeDamage(amt) {
  playerHp = Math.max(0, playerHp - amt);
  document.getElementById('health-fill').style.width = playerHp + '%';
  document.getElementById('health-fill').style.background =
    playerHp > 50 ? 'linear-gradient(90deg, #ff4444, #ff8800)' :
    playerHp > 25 ? 'linear-gradient(90deg, #ff2200, #ff6600)' :
    'linear-gradient(90deg, #cc0000, #ff0000)';
  const overlay = document.getElementById('damage-overlay');
  overlay.style.opacity = '1';
  setTimeout(() => { overlay.style.opacity = '0'; }, 200);

  if (playerHp <= 0) endGame();
}

function updateHUD() {
  document.getElementById('ammo-count').textContent = ammo;
  document.getElementById('ammo-reserve').textContent = '/ ' + reserveAmmo;
  document.getElementById('score-value').textContent = score.toLocaleString();
  document.getElementById('wave-display').textContent = 'WAVE ' + wave;
  document.getElementById('health-fill').style.width = playerHp + '%';
}

function startWave(w) {
  wave = w;
  waveTotal = 5 + w * 3;
  waveEnemiesLeft = waveTotal;
  waveEnemiesSpawned = 0;
  waveSpawnTimer = 0;
  waveComplete = false;

  // Announce
  const ann = document.getElementById('wave-announce');
  ann.textContent = `WAVE ${w}`;
  ann.style.opacity = '1';
  setTimeout(() => { ann.style.opacity = '0'; }, 2000);
  updateHUD();
}

function endGame() {
  gameState = 'gameover';
  document.exitPointerLock();
  const go = document.getElementById('game-over');
  go.style.display = 'flex';
  document.getElementById('final-score').textContent = `SCORE: ${score.toLocaleString()}  |  WAVE: ${wave}`;
}

function startGame() {
  gameState = 'playing';
  playerHp = 100;
  score = 0;
  wave = 0;
  ammo = 30;
  reserveAmmo = 120;
  isReloading = false;
  enemies.length = 0;
  particles.length = 0;
  camera.position.set(0, 1.7, 0);
  yaw = 0; pitch = 0;
  updateHUD();
  startWave(1);
  canvas.requestPointerLock();
}

document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  startGame();
});

document.getElementById('restart-btn').addEventListener('click', () => {
  document.getElementById('game-over').style.display = 'none';
  // Clear all enemies from scene
  for (const en of enemies) scene.remove(en.mesh);
  enemies.length = 0;
  startGame();
});

// Collision
function playerVsObstacles(newPos) {
  const pr = 0.5;
  for (const obs of allObstacles) {
    const hw = obs.w / 2 + pr;
    const hd = obs.d / 2 + pr;
    if (Math.abs(newPos.x - obs.x) < hw && Math.abs(newPos.z - obs.z) < hd) {
      const dx = newPos.x - obs.x;
      const dz = newPos.z - obs.z;
      if (Math.abs(dx) / hw > Math.abs(dz) / hd) {
        newPos.x = obs.x + (dx > 0 ? hw : -hw);
      } else {
        newPos.z = obs.z + (dz > 0 ? hd : -hd);
      }
    }
  }
  newPos.x = Math.max(-ARENA_SIZE, Math.min(ARENA_SIZE, newPos.x));
  newPos.z = Math.max(-ARENA_SIZE, Math.min(ARENA_SIZE, newPos.z));
}

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (gameState !== 'playing') {
    renderer.render(scene, camera);
    return;
  }

  // Player movement
  sprintFactor = keys['ShiftLeft'] ? 1.7 : 1;
  const speed = 0.1 * sprintFactor;
  const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
  const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
  const moveDir = new THREE.Vector3();

  if (keys['KeyW']) moveDir.add(forward);
  if (keys['KeyS']) moveDir.sub(forward);
  if (keys['KeyA']) moveDir.sub(right);
  if (keys['KeyD']) moveDir.add(right);

  if (moveDir.lengthSq() > 0) moveDir.normalize().multiplyScalar(speed);
  const newPos = camera.position.clone().add(moveDir);
  newPos.y = 1.7;
  playerVsObstacles(newPos);
  camera.position.copy(newPos);

  // Gun bob
  const moving = moveDir.lengthSq() > 0;
  if (moving) {
    gunBob += dt * 8 * sprintFactor;
    gunGroup.position.y = -0.01 + Math.sin(gunBob) * 0.008;
    gunGroup.position.x = Math.cos(gunBob * 0.5) * 0.004;
    gunSway += dt * 2;
  } else {
    gunBob *= 0.9;
    gunGroup.position.y *= 0.85;
    gunGroup.position.x *= 0.85;
  }

  // Gun recoil recovery
  if (gunRecoil > 0) {
    camera.rotation.x = pitch - gunRecoil;
    gunRecoil -= dt * 3;
    if (gunRecoil < 0) gunRecoil = 0;
  } else {
    camera.rotation.x = pitch;
  }
  camera.rotation.y = yaw;
  camera.rotation.order = 'YXZ';

  // Auto-fire when holding mouse (tracked via keys)
  shootCooldown -= dt;
  if (keys['mouse0'] && shootCooldown <= 0 && isLocked) shoot();

  // Reload
  if (isReloading) {
    reloadTime += dt;
    const progress = reloadTime / RELOAD_DURATION;
    document.getElementById('reload-fill').style.width = (progress * 100) + '%';
    if (reloadTime >= RELOAD_DURATION) finishReload();
  }

  // Particle update
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.age += dt;
    p.position.add(p.userData.vel);
    if (p.userData.isBlood) {
      p.userData.vel.y -= 0.02;
    }
    p.material.opacity = 1 - p.userData.age / p.userData.life;
    if (p.userData.age >= p.userData.life) {
      scene.remove(p);
      particles.splice(i, 1);
    }
  }

  // Bullet trail update
  for (let i = bulletTrails.length - 1; i >= 0; i--) {
    const t = bulletTrails[i];
    t.userData.life -= dt;
    t.material.opacity = t.userData.life * 6;
    if (t.userData.life <= 0) {
      scene.remove(t);
      bulletTrails.splice(i, 1);
    }
  }

  // Wave spawning
  waveSpawnTimer -= dt;
  if (waveEnemiesSpawned < waveTotal && waveSpawnTimer <= 0) {
    spawnEnemy(wave);
    waveEnemiesSpawned++;
    waveSpawnTimer = 1.5 - wave * 0.1;
  }

  // Check wave complete
  if (waveEnemiesSpawned >= waveTotal && waveEnemiesLeft <= 0 && !waveComplete) {
    waveComplete = true;
    // Bonus ammo
    reserveAmmo = Math.min(240, reserveAmmo + 30);
    updateHUD();
    setTimeout(() => startWave(wave + 1), 3000);
  }

  // Enemy AI
  const playerPos = camera.position.clone();
  for (const en of enemies) {
    if (!en.isAlive) continue;

    if (en.mesh.userData.dying) {
      en.mesh.userData.dyingTimer += dt;
      en.mesh.rotation.x = en.mesh.userData.dyingTimer * 3;
      en.mesh.position.y = -en.mesh.userData.dyingTimer * 0.5;
      continue;
    }

    // Face player
    const toPlayer = new THREE.Vector3(
      playerPos.x - en.mesh.position.x, 0, playerPos.z - en.mesh.position.z
    );
    const dist = toPlayer.length();
    en.mesh.rotation.y = Math.atan2(toPlayer.x, toPlayer.z);

    // Walk animation
    en.walkCycle += dt * en.speed * 50;
    en.mesh.position.y = Math.abs(Math.sin(en.walkCycle)) * 0.05;

    // Move toward player
    if (dist > 1.5) {
      const moveAmt = toPlayer.normalize().multiplyScalar(en.speed);
      const enNewPos = en.mesh.position.clone().add(moveAmt);
      en.mesh.position.copy(enNewPos);
    }

    // Attack
    if (dist < 2.0) {
      en.attackCooldown -= dt;
      if (en.attackCooldown <= 0) {
        takeDamage(8 + wave * 2);
        en.attackCooldown = 1.5;
      }
    }

    // Health bar faces camera
    const hb = en.mesh.getObjectByName('healthBar');
    if (hb) {
      hb.lookAt(camera.position);
    }
  }

  // Auto-reload on empty
  if (ammo === 0 && !isReloading && reserveAmmo > 0) startReload();

  // Hold mouse auto fire
  if (document.pointerLockElement === canvas) {
    document.addEventListener('mousedown', (e) => {
      if (e.button === 0) keys['mouse0'] = true;
    }, { once: false });
    document.addEventListener('mouseup', (e) => {
      if (e.button === 0) keys['mouse0'] = false;
    }, { once: false });
  }

  renderer.render(scene, camera);
}

// Mouse hold tracking
document.addEventListener('mousedown', e => { if (e.button === 0) keys['mouse0'] = true; });
document.addEventListener('mouseup', e => { if (e.button === 0) keys['mouse0'] = false; });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

updateHUD();
animate();
</script>
</body>
