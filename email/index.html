<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Manager V7</title>

<style>
  body{
    margin:0;
    font-family:Arial;
    background:#f4f6f8;
  }

  .container{
    max-width:1100px;
    margin:auto;
    padding:24px;
    display:grid;
    gap:20px;
  }

  .card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
  }

  .email-list{ display:grid; gap:12px; }

  .email-item{
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:14px;
    cursor:pointer;
  }

  .email-item.inactive{
    background:#fee2e2;
    border-color:#fca5a5;
  }

  .meta{
    font-size:13px;
    color:#6b7280;
    margin-top:6px;
  }

  input, select{
    width:100%;
    padding:10px;
    margin-top:6px;
    border-radius:10px;
    border:1px solid #d1d5db;
  }

  button{
    padding:10px 14px;
    border:0;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
  }

  .btn-primary{ background:#2563eb; color:white; }
  .btn-danger{ background:#dc2626; color:white; }
  .btn-secondary{ background:#e5e7eb; }

  .row{ display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }

  /* MODAL */
  .modal-backdrop{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
  }

  .modal{
    background:white;
    width:420px;
    padding:20px;
    border-radius:14px;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
  }

  .modal h3{ margin-top:0; }

  .modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    margin-top:12px;
  }
</style>
</head>

<body>
<div class="container">

  <div class="card">
    <h2>Stored Emails</h2>
    <h3>Password is always Wolf.5790</h3>
    <div id="list" class="email-list"></div>
  </div>

  <div class="card">
    <h2>Add Email</h2>

    <label>Email</label>
    <input id="email" type="email" placeholder="name@outlook.com">

    <label>Type</label>
    <select id="type">
      <option value="main">Main</option>
      <option value="forwarder">Forward</option>
    </select>

    <label>Forward To</label>
    <select id="forwardTo"></select>

    <div class="row">
      <button class="btn-primary" id="addBtn">Add Email</button>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBg">
  <div class="modal">
    <h3>Deactivate Email</h3>

    <label>Reactivate At</label>
    <input type="datetime-local" id="deactivateUntil">

    <div class="modal-actions">
      <button class="btn-secondary" id="cancelModal">Cancel</button>
      <button class="btn-danger" id="confirmDeactivate">Deactivate</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  serverTimestamp,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDEsmdqWZ2lBU7MpnXCjD12aQViUDb4dqA",
  authDomain:"innovateprogram-fd00c.firebaseapp.com",
  projectId:"innovateprogram-fd00c"
});

const db = getFirestore(app);

/* UI */
const email = document.getElementById("email");
const type = document.getElementById("type");
const forwardTo = document.getElementById("forwardTo");
const list = document.getElementById("list");
const addBtn = document.getElementById("addBtn");

/* MODAL */
const modalBg = document.getElementById("modalBg");
const deactivateUntil = document.getElementById("deactivateUntil");
const cancelModal = document.getElementById("cancelModal");
const confirmDeactivate = document.getElementById("confirmDeactivate");

let selectedId = null;

const norm = e => (e||"").trim().toLowerCase();

function isOutlook(e){
  return e.endsWith("@outlook.com") || e.endsWith("@outlook.com.au");
}

function isPast(t){
  return t && new Date(t) <= new Date();
}

function isActive(i){
  if(!i.inactive) return true;
  if(i.inactiveUntil && !isPast(i.inactiveUntil)) return false;
  return true;
}

/* LOAD */
async function load(){
  const snap = await getDocs(query(collection(db,"emails"), orderBy("createdAt","desc")));

  const items = [];
  snap.forEach(d=>items.push({id:d.id, ...d.data()}));

  const mains = items.filter(i=>i.type==="main" && isActive(i));

  forwardTo.innerHTML = `<option value="">Select main email</option>`;
  mains.forEach(m=>{
    const o = document.createElement("option");
    o.value = m.email;
    o.textContent = m.email;
    forwardTo.appendChild(o);
  });

  list.innerHTML = "";

  items.forEach(i=>{
    const active = isActive(i);

    const div = document.createElement("div");
    div.className = "email-item" + (!active ? " inactive":"");

    div.innerHTML = `
      <strong>${i.email}</strong>
      ${!active ? `<span> (inactive)</span>` : ""}

      <div class="meta">
        Forward → ${i.forwardTo || "none"}<br>
        ${i.inactiveUntil ? "Until: " + new Date(i.inactiveUntil).toLocaleString() : ""}
      </div>

      <div class="row">
        <button class="btn-secondary" data-deactivate="${i.id}">
          ${active ? "Deactivate" : "Reactivate"}
        </button>

        <button class="btn-danger" data-del="${i.id}">
          Delete
        </button>
      </div>
    `;

    list.appendChild(div);
  });

  bind();
}

/* BIND */
function bind(){

  document.querySelectorAll("[data-del]").forEach(b=>{
    b.onclick = async (e)=>{
      e.stopPropagation();
      await deleteDoc(doc(db,"emails",b.dataset.del));
      load();
    };
  });

  document.querySelectorAll("[data-deactivate]").forEach(b=>{
    b.onclick = (e)=>{
      e.stopPropagation();
      selectedId = b.dataset.deactivate;
      deactivateUntil.value = "";
      modalBg.style.display = "flex";
    };
  });
}

/* MODAL ACTIONS */
cancelModal.onclick = ()=>{
  modalBg.style.display = "none";
  selectedId = null;
};

confirmDeactivate.onclick = async ()=>{
  if(!selectedId) return;

  const ref = doc(db,"emails",selectedId);

  const until = deactivateUntil.value;
  const snap = await getDocs(collection(db,"emails"));
  const item = snap.docs.find(d=>d.id===selectedId).data();

  const active = isActive(item);

  if(active){
    if(!until) return alert("Select a reactivation time");

    await updateDoc(ref,{
      inactive:true,
      inactiveUntil:new Date(until).toISOString()
    });
  } else {
    await updateDoc(ref,{
      inactive:false,
      inactiveUntil:""
    });
  }

  modalBg.style.display = "none";
  selectedId = null;
  load();
};

/* ADD */
addBtn.onclick = async ()=>{
  const e = norm(email.value);
  const f = norm(forwardTo.value);

  if(!isOutlook(e)) return alert("Outlook only");

  if(type.value==="forwarder" && !f)
    return alert("Pick main email");

  await addDoc(collection(db,"emails"),{
    email:e,
    type:type.value,
    forwardTo:type.value==="forwarder"?f:"",
    inactive:false,
    inactiveUntil:"",
    createdAt:serverTimestamp()
  });

  email.value="";
  load();
};

load();
setInterval(load,30000);
</script>
</body>
</html>
