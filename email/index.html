<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Manager V3</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #2563eb;
      --danger: #dc2626;
      --success-bg: #dcfce7;
      --danger-bg: #fee2e2;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .email-list { display: grid; gap: 12px; }

    .email-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
    }

    .email-item.inactive {
      background: var(--danger-bg);
      border-color: #fca5a5;
      opacity: 0.9;
    }

    .meta {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    label { font-weight: 700; display:block; margin-bottom:6px; }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .field { margin-bottom: 14px; }

    button {
      padding: 10px 14px;
      border: 0;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-secondary { background: #e5e7eb; }

    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: 700;
      margin-left: 6px;
    }

    .main { background: var(--success-bg); }
    .inactive { background: var(--danger-bg); }

    .button-row { display:flex; gap:10px; margin-top:10px; }
  </style>
</head>

<body>
<div class="container">

  <!-- STORED FIRST -->
  <div class="card">
    <h2>Stored Emails</h2>
    <div id="list" class="email-list"></div>
  </div>

  <!-- ADD SECOND -->
  <div class="card">
    <h2>Add Email</h2>

    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="name@outlook.com">
    </div>

    <div class="field">
      <label>Type</label>
      <select id="type">
        <option value="main">Main</option>
        <option value="forwarder">Forward</option>
      </select>
    </div>

    <div class="field">
      <label>Forward To</label>
      <select id="forwardTo"></select>
    </div>

    <div class="field">
      <label>Inactive Until (required)</label>
      <input id="inactiveUntil" type="datetime-local">
    </div>

    <div class="button-row">
      <button class="btn-primary" id="addBtn">Add Email</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  serverTimestamp,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDEsmdqWZ2lBU7MpnXCjD12aQViUDb4dqA",
  authDomain: "innovateprogram-fd00c.firebaseapp.com",
  projectId: "innovateprogram-fd00c",
});

const db = getFirestore(app);

const email = document.getElementById("email");
const type = document.getElementById("type");
const forwardTo = document.getElementById("forwardTo");
const inactiveUntil = document.getElementById("inactiveUntil");
const list = document.getElementById("list");
const addBtn = document.getElementById("addBtn");

const norm = e => (e||"").trim().toLowerCase();

function isOutlook(e){
  return e.endsWith("@outlook.com") || e.endsWith("@outlook.com.au");
}

function isPast(dt){
  return dt && new Date(dt) <= new Date();
}

/* LOAD */
async function load(){
  const snap = await getDocs(query(collection(db,"emails"), orderBy("createdAt","desc")));

  const items = [];
  snap.forEach(d=>{
    const x = d.data();

    // AUTO INACTIVE CHECK (based on date/time)
    const autoInactive = x.inactiveUntil && isPast(x.inactiveUntil);

    items.push({
      id: d.id,
      ...x,
      autoInactive
    });
  });

  const activeMains = items.filter(i => i.type==="main" && !i.autoInactive);

  forwardTo.innerHTML = `<option value="">Select main email</option>`;
  activeMains.forEach(m=>{
    const o = document.createElement("option");
    o.value = m.email;
    o.textContent = m.email;
    forwardTo.appendChild(o);
  });

  list.innerHTML = "";

  items.forEach(i=>{
    const realInactive = i.autoInactive;

    const div = document.createElement("div");
    div.className = "email-item" + (realInactive ? " inactive":"");

    div.onclick = async () => {
      // manual override toggle (optional control)
      await updateDoc(doc(db,"emails",i.id), {
        manualInactive: !i.manualInactive
      });
      load();
    };

    div.innerHTML = `
      <strong>${i.email}</strong>
      <span class="badge ${i.type==="main"?"main":"inactive"}">${i.type}</span>
      ${realInactive ? `<span class="badge inactive">inactive</span>`:""}

      <div class="meta">
        Forward → ${i.forwardTo || "none"}<br>
        Inactive Until → ${i.inactiveUntil || "not set"}
      </div>

      <div class="button-row">
        <button class="btn-secondary" data-del="${i.id}">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });

  bind();
}

/* ACTIONS */
function bind(){
  document.querySelectorAll("[data-del]").forEach(b=>{
    b.onclick = async (e)=>{
      e.stopPropagation();
      await deleteDoc(doc(db,"emails",b.dataset.del));
      load();
    };
  });
}

/* ADD */
addBtn.onclick = async ()=>{
  const e = norm(email.value);
  const f = norm(forwardTo.value);

  if(!isOutlook(e)) return alert("Only Outlook allowed");

  if(type.value==="forwarder" && !f)
    return alert("Pick main email");

  if(!inactiveUntil.value)
    return alert("You must set inactive date + time");

  await addDoc(collection(db,"emails"),{
    email: e,
    type: type.value,
    forwardTo: type.value==="forwarder"?f:"",
    inactiveUntil: inactiveUntil.value,
    manualInactive: false,
    createdAt: serverTimestamp()
  });

  email.value="";
  load();
};

load();
setInterval(load,30000);
</script>

</body>
</html>
