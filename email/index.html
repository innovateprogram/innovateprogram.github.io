<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Manager V3</title>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #d1d5db;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --danger: #dc2626;
      --danger-bg: #fee2e2;
      --success: #16a34a;
      --success-bg: #dcfce7;
      --shadow: 0 10px 30px rgba(0,0,0,0.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .email-list { display: grid; gap: 12px; }

    .email-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      background: #fff;
    }

    .email-item.inactive {
      background: #fef2f2;
      border-color: #fca5a5;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-top: 10px;
    }

    label { font-weight: 700; display:block; margin-bottom:6px; }

    input, select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
    }

    .field { margin-bottom: 14px; }

    .button-row { display:flex; gap:10px; flex-wrap:wrap; }

    button {
      border: 0;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary { background: var(--primary); color:#fff; }
    .btn-danger { background: var(--danger); color:#fff; }
    .btn-secondary { background:#e5e7eb; }

    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      font-weight: 700;
      display:inline-block;
    }

    .badge-main { background: var(--success-bg); color:#166534; }
    .badge-inactive { background: var(--danger-bg); color:#991b1b; }
  </style>
</head>

<body>
<div class="container">

  <div class="card">
    <h1>Email Manager</h1>
    <div id="status"></div>
  </div>

  <div class="card">
    <h2>Add Email</h2>

    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="name@outlook.com" />
    </div>

    <div class="field">
      <label>Type</label>
      <select id="type">
        <option value="main">Main Email</option>
        <option value="forwarder">Forward Email</option>
      </select>
    </div>

    <div class="field">
      <label>Forward To (main emails only)</label>
      <select id="forwardTo"></select>
    </div>

    <div class="field">
      <label>Inactive Until</label>
      <input id="inactiveUntil" type="datetime-local" />
    </div>

    <div class="button-row">
      <button class="btn-primary" id="addBtn">Add</button>
    </div>
  </div>

  <div class="card">
    <h2>Stored Emails</h2>
    <div id="list" class="email-list"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  serverTimestamp,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDEsmdqWZ2lBU7MpnXCjD12aQViUDb4dqA",
  authDomain: "innovateprogram-fd00c.firebaseapp.com",
  projectId: "innovateprogram-fd00c",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- UI ---------------- */

const emailInput = document.getElementById("email");
const typeInput = document.getElementById("type");
const forwardToInput = document.getElementById("forwardTo");
const inactiveUntilInput = document.getElementById("inactiveUntil");
const list = document.getElementById("list");
const status = document.getElementById("status");
const addBtn = document.getElementById("addBtn");

function nowLocal() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0,16);
}

inactiveUntilInput.value = nowLocal();

function norm(e){ return (e||"").trim().toLowerCase(); }

function isOutlook(e){
  return e.endsWith("@outlook.com") || e.endsWith("@outlook.com.au");
}

function isPast(dt){
  return dt && new Date(dt) <= new Date();
}

function setStatus(t){ status.textContent = t; }

/* ---------------- LOAD ---------------- */

async function load(){
  const snap = await getDocs(query(collection(db,"emails"), orderBy("createdAt","desc")));

  const items = [];
  snap.forEach(d=>{
    const x = d.data();
    const inactiveNow = x.inactive && isPast(x.inactiveUntil);
    items.push({id:d.id, ...x, inactiveNow});
  });

  list.innerHTML = "";

  const mains = items.filter(i=>i.type==="main" && !i.inactiveNow);

  populateForward(mains);

  items.forEach(i=>{
    const div = document.createElement("div");
    div.className = "email-item" + (i.inactiveNow ? " inactive":"");

    div.innerHTML = `
      <div>
        <strong>${i.email}</strong>
        <span class="badge ${i.type==="main"?"badge-main":""}">${i.type}</span>
        ${i.inactiveNow ? `<span class="badge badge-inactive">inactive</span>`:""}
      </div>

      <div class="meta">
        Forward → ${i.forwardTo || "none"}<br>
        Until → ${i.inactiveUntil || "none"}
      </div>

      <div class="button-row">
        <button class="btn-secondary" data-toggle="${i.id}">
          ${i.inactiveNow ? "Reactivate" : "Deactivate"}
        </button>
        <button class="btn-danger" data-del="${i.id}">Delete</button>
      </div>
    `;

    list.appendChild(div);
  });

  bind();
}

/* ---------------- FORWARD OPTIONS ---------------- */

function populateForward(mains){
  forwardToInput.innerHTML = `<option value="">Select main email</option>`;
  mains.forEach(m=>{
    const o = document.createElement("option");
    o.value = m.email;
    o.textContent = m.email;
    forwardToInput.appendChild(o);
  });
}

/* ---------------- ACTIONS ---------------- */

function bind(){
  document.querySelectorAll("[data-del]").forEach(b=>{
    b.onclick = async ()=>{
      await deleteDoc(doc(db,"emails",b.dataset.del));
      load();
    };
  });

  document.querySelectorAll("[data-toggle]").forEach(b=>{
    b.onclick = async ()=>{
      const ref = doc(db,"emails",b.dataset.toggle);
      const snap = await getDocs(collection(db,"emails"));
      const current = snap.docs.find(d=>d.id===b.dataset.toggle).data();

      await updateDoc(ref,{
        inactive: !current.inactive
      });

      load();
    };
  });
}

/* ---------------- ADD ---------------- */

async function add(){
  const email = norm(emailInput.value);
  const type = typeInput.value;
  const forwardTo = norm(forwardToInput.value);

  if(!isOutlook(email)) return alert("Only Outlook emails allowed");

  if(type==="forwarder" && !forwardTo)
    return alert("Select main email");

  await addDoc(collection(db,"emails"),{
    email,
    type,
    forwardTo: type==="forwarder"?forwardTo:"",
    inactive:false,
    inactiveUntil: inactiveUntilInput.value,
    createdAt: serverTimestamp()
  });

  emailInput.value="";
  typeInput.value="main";
  forwardToInput.value="";
  load();
}

addBtn.onclick = add;

load();
setInterval(load,30000);
setStatus("Connected");
</script>

</body>
</html>
