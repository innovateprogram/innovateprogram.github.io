<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Manager V6</title>

  <style>
    body {
      margin:0;
      font-family:Arial;
      background:#f4f6f8;
    }

    .container {
      max-width:1100px;
      margin:auto;
      padding:24px;
      display:grid;
      gap:20px;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
    }

    .email-list { display:grid; gap:12px; }

    .email-item {
      border:1px solid #d1d5db;
      border-radius:12px;
      padding:14px;
      cursor:pointer;
    }

    .email-item.inactive {
      background:#fee2e2;
      border-color:#fca5a5;
    }

    .meta {
      font-size:13px;
      color:#6b7280;
      margin-top:6px;
    }

    input, select {
      width:100%;
      padding:10px;
      margin-top:6px;
      border-radius:10px;
      border:1px solid #d1d5db;
    }

    button {
      padding:10px 14px;
      border:0;
      border-radius:10px;
      font-weight:700;
      cursor:pointer;
    }

    .btn-primary { background:#2563eb; color:white; }
    .btn-danger { background:#dc2626; color:white; }
    .btn-secondary { background:#e5e7eb; }

    .row { display:flex; gap:10px; margin-top:10px; flex-wrap:wrap; }
  </style>
</head>

<body>
<div class="container">

  <!-- STORED EMAILS -->
  <div class="card">
    <h2>Stored Emails</h2>
    <div id="list" class="email-list"></div>
  </div>

  <!-- ADD EMAIL -->
  <div class="card">
    <h2>Add Email</h2>

    <label>Email</label>
    <input id="email" type="email" placeholder="name@outlook.com">

    <label>Type</label>
    <select id="type">
      <option value="main">Main</option>
      <option value="forwarder">Forward</option>
    </select>

    <label>Forward To</label>
    <select id="forwardTo"></select>

    <div class="row">
      <button class="btn-primary" id="addBtn">Add Email</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  serverTimestamp,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyDEsmdqWZ2lBU7MpnXCjD12aQViUDb4dqA",
  authDomain: "innovateprogram-fd00c.firebaseapp.com",
  projectId: "innovateprogram-fd00c"
});

const db = getFirestore(app);

const email = document.getElementById("email");
const type = document.getElementById("type");
const forwardTo = document.getElementById("forwardTo");
const list = document.getElementById("list");
const addBtn = document.getElementById("addBtn");

const norm = e => (e||"").trim().toLowerCase();

function isOutlook(e){
  return e.endsWith("@outlook.com") || e.endsWith("@outlook.com.au");
}

function isPast(t){
  return t && new Date(t) <= new Date();
}

/* ACTIVE STATE LOGIC */
function isActive(item){
  if(!item.inactive) return true;
  if(item.inactiveUntil && !isPast(item.inactiveUntil)) return false;
  return true;
}

/* LOAD */
async function load(){
  const snap = await getDocs(query(collection(db,"emails"), orderBy("createdAt","desc")));

  const items = [];
  snap.forEach(d=>items.push({id:d.id, ...d.data()}));

  const mains = items.filter(i=>i.type==="main" && isActive(i));

  forwardTo.innerHTML = `<option value="">Select main email</option>`;
  mains.forEach(m=>{
    const o = document.createElement("option");
    o.value = m.email;
    o.textContent = m.email;
    forwardTo.appendChild(o);
  });

  list.innerHTML = "";

  items.forEach(i=>{
    const active = isActive(i);

    const div = document.createElement("div");
    div.className = "email-item" + (!active ? " inactive":"");

    div.innerHTML = `
      <strong>${i.email}</strong>
      ${!active ? `<span> (inactive)</span>` : ""}

      <div class="meta">
        Forward → ${i.forwardTo || "none"}<br>
        ${i.inactiveUntil ? "Until: " + new Date(i.inactiveUntil).toLocaleString() : ""}
      </div>

      <div class="row">
        <button class="btn-secondary" data-toggle="${i.id}">
          ${active ? "Deactivate" : "Reactivate"}
        </button>

        <button class="btn-danger" data-del="${i.id}">
          Delete
        </button>
      </div>
    `;

    list.appendChild(div);
  });

  bind();
}

/* ACTIONS */
function bind(){

  document.querySelectorAll("[data-del]").forEach(b=>{
    b.onclick = async (e)=>{
      e.stopPropagation();
      await deleteDoc(doc(db,"emails",b.dataset.del));
      load();
    };
  });

  document.querySelectorAll("[data-toggle]").forEach(b=>{
    b.onclick = async (e)=>{
      e.stopPropagation();

      const ref = doc(db,"emails",b.dataset.toggle);

      const snap = await getDocs(collection(db,"emails"));
      const item = snap.docs.find(d=>d.id===b.dataset.toggle).data();

      const active = isActive(item);

      if(active){
        const until = prompt("Set reactivation date/time (YYYY-MM-DD HH:MM):");

        if(!until) return;

        const parsed = new Date(until.replace(" ", "T"));

        await updateDoc(ref,{
          inactive:true,
          inactiveUntil: parsed.toISOString()
        });

      } else {
        await updateDoc(ref,{
          inactive:false,
          inactiveUntil:""
        });
      }

      load();
    };
  });
}

/* ADD */
addBtn.onclick = async ()=>{
  const e = norm(email.value);
  const f = norm(forwardTo.value);

  if(!isOutlook(e)) return alert("Outlook only");

  if(type.value==="forwarder" && !f)
    return alert("Select main email");

  await addDoc(collection(db,"emails"),{
    email:e,
    type:type.value,
    forwardTo:type.value==="forwarder"?f:"",
    inactive:false,
    inactiveUntil:"",
    createdAt:serverTimestamp()
  });

  email.value="";
  load();
};

load();
setInterval(load,30000);
</script>
</body>
</html>
