<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectly - FOH Display</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #displayContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #backgroundLayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        #backgroundLayer.visible { opacity: 1; }
        #backgroundLayer img,
        #backgroundLayer video {
            width: 100%; height: 100%; object-fit: cover;
        }

        #logoLayer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            max-width: 80%; max-height: 80%;
        }
        #logoLayer.visible { opacity: 1; }
        #logoLayer img { max-width: 100%; max-height: 100%; object-fit: contain; }

        #contentLayer {
            position: relative;
            z-index: 3;
            width: 90%;
            max-width: 1400px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        #contentLayer.visible { opacity: 1; }

        /* For media (sermon) content, expand to fill the screen */
        #contentLayer.media-mode {
            width: 100%;
            max-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lyrics-text {
            font-size: 4rem;
            line-height: 1.5;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            white-space: pre-line;
            padding: 40px;
        }

        .sermon-image {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
        }

        .sermon-video {
            max-width: 100%;
            max-height: 100vh;
            object-fit: contain;
            background: #000;
        }

        .sermon-iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            background: #fff;
        }

        #licenseDisplay {
            position: absolute;
            bottom: 20px; right: 30px;
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #licenseDisplay.visible { opacity: 1; }

        #statusMsg {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: rgba(255,255,255,0.3);
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="displayContainer">
    <div id="backgroundLayer"></div>
    <div id="logoLayer"></div>
    <div id="contentLayer"></div>
    <div id="licenseDisplay"></div>
    <div id="statusMsg">FOH — Waiting for content…</div>
</div>

<script>
    let currentBackground = null;
    let currentLogo = null;
    let backgroundVisible = false;
    let logoVisible = false;
    let globalFadeTime = 500;
    let globalSongFade = true;
    let licenseTimer = null;

    window.addEventListener('message', (event) => {
        const data = event.data;
        if (!data || !data.type) return;

        switch (data.type) {
            case 'init':
                globalFadeTime = (data.fadeTime !== undefined) ? data.fadeTime : globalFadeTime;
                globalSongFade = (data.enableSongFade !== undefined) ? data.enableSongFade : globalSongFade;
                if (data.backgroundUrl) {
                    applyBackground(data.backgroundUrl);
                }
                document.getElementById('statusMsg').textContent = 'FOH — Live';
                break;

            case 'display':
                if (data.fadeTime !== undefined) globalFadeTime = data.fadeTime;
                if (data.enableSongFade !== undefined) globalSongFade = data.enableSongFade;

                if (data.backgroundUrl !== undefined) {
                    if (data.backgroundUrl) {
                        applyBackground(data.backgroundUrl);
                    }
                }

                displayContent(
                    data.content,
                    data.typography,
                    data.fadeTime,
                    data.enableSongFade
                );
                break;

            case 'setBackground':
                applyBackground(data.url);
                break;

            case 'setLogo':
                currentLogo = data.url;
                break;

            case 'fohCommand':
                switch (data.command) {
                    case 'toggleBackground': toggleBackground(); break;
                    case 'toggleLogo':       toggleLogo();       break;
                    case 'blank':            displayContent({ type: 'blank' }); break;
                }
                break;
        }
    });

    function applyBackground(url) {
        if (!url) return;
        currentBackground = url;
        const bgLayer = document.getElementById('backgroundLayer');
        const isVideo = /\.mp4/i.test(url);
        bgLayer.innerHTML = isVideo
            ? `<video autoplay loop muted playsinline><source src="${url}" type="video/mp4"></video>`
            : `<img src="${url}" alt="Background">`;
        bgLayer.classList.add('visible');
        backgroundVisible = true;
    }

    function toggleBackground() {
        const bgLayer = document.getElementById('backgroundLayer');
        if (backgroundVisible) {
            bgLayer.classList.remove('visible');
            backgroundVisible = false;
        } else if (currentBackground) {
            applyBackground(currentBackground);
        }
    }

    function toggleLogo() {
        const logoLayer = document.getElementById('logoLayer');
        if (logoVisible) {
            logoLayer.classList.remove('visible');
            logoVisible = false;
        } else if (currentLogo) {
            logoLayer.innerHTML = `<img src="${currentLogo}" alt="Logo">`;
            logoLayer.classList.add('visible');
            logoVisible = true;
        }
    }

    function displayContent(content, typography, msgFadeTime, msgSongFade) {
        const contentLayer = document.getElementById('contentLayer');
        const licenseDisplay = document.getElementById('licenseDisplay');
        const statusMsg = document.getElementById('statusMsg');

        const ft = (msgFadeTime !== undefined) ? msgFadeTime : globalFadeTime;
        const useFade = (msgSongFade !== undefined) ? msgSongFade : globalSongFade;
        const effectiveFade = useFade ? ft : 0;

        statusMsg.style.opacity = '0';

        contentLayer.style.transition = effectiveFade > 0
            ? `opacity ${effectiveFade}ms ease-in-out`
            : 'none';
        contentLayer.classList.remove('visible');

        const applyContent = () => {
            // Reset media-mode class
            contentLayer.classList.remove('media-mode');

            if (content.type === 'blank') {
                contentLayer.innerHTML = '';
                licenseDisplay.classList.remove('visible');

            } else if (content.type === 'lyrics') {
                const t = typography || {};
                const style = [
                    `font-family: ${t.fontFamily || "'Segoe UI', sans-serif"}`,
                    `font-weight: ${t.fontWeight || 700}`,
                    `font-size: ${t.fontSize || 64}px`,
                    `color: ${t.textColor || '#ffffff'}`,
                    `text-shadow: ${t.textShadow || '2px 2px 4px rgba(0,0,0,0.8)'}`,
                    `text-align: ${t.textAlign || 'center'}`,
                    `line-height: ${((t.lineHeight || 140) / 100)}`
                ].join(';');

                contentLayer.innerHTML = `<div class="lyrics-text" style="${style}">${escapeHtml(content.text)}</div>`;

                if (content.license) {
                    clearTimeout(licenseTimer);
                    licenseDisplay.textContent = content.license;
                    licenseDisplay.classList.add('visible');
                    licenseTimer = setTimeout(() => licenseDisplay.classList.remove('visible'), 5000);
                }

            } else if (content.type === 'sermon') {
                // Expand content layer to fill screen for media
                contentLayer.classList.add('media-mode');

                const mediaType = content.mediaType || 'image';

                if (mediaType === 'video') {
                    contentLayer.innerHTML = `<video class="sermon-video" autoplay controls loop>
                        <source src="${content.url}">
                        Your browser does not support video playback.
                    </video>`;

                } else if (mediaType === 'pdf') {
                    contentLayer.innerHTML = `<iframe
                        class="sermon-iframe"
                        src="${content.url}"
                        title="PDF Slide">
                    </iframe>`;

                } else if (mediaType === 'pptx') {
                    // PPTX files are shown via Google Docs viewer or direct URL
                    contentLayer.innerHTML = `<iframe
                        class="sermon-iframe"
                        src="https://docs.google.com/viewer?url=${encodeURIComponent(content.url)}&embedded=true"
                        title="Presentation Slide">
                    </iframe>`;

                } else {
                    // Default: image
                    contentLayer.innerHTML = `<img src="${content.url}" class="sermon-image" alt="Slide">`;
                }
            }

            // Fade in
            contentLayer.style.transition = effectiveFade > 0
                ? `opacity ${effectiveFade}ms ease-in-out`
                : 'none';
            contentLayer.classList.add('visible');
        };

        if (effectiveFade > 0) {
            setTimeout(applyContent, effectiveFade);
        } else {
            applyContent();
        }
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    if (window.opener) {
        window.opener.postMessage({ type: 'fohReady' }, '*');
    }
</script>
</body>
</html>
