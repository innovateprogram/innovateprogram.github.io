<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projectly - FOH Display</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: white;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #displayContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #backgroundLayer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        #backgroundLayer.visible { opacity: 1; }
        #backgroundLayer img,
        #backgroundLayer video {
            width: 100%; height: 100%; object-fit: cover;
        }

        #logoLayer {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            max-width: 80%; max-height: 80%;
        }
        #logoLayer.visible { opacity: 1; }
        #logoLayer img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Content layer — fades in/out */
        #contentLayer {
            position: relative;
            z-index: 3;
            width: 90%;
            max-width: 1400px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        #contentLayer.visible { opacity: 1; }

        .lyrics-text {
            font-size: 4rem;
            line-height: 1.5;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            white-space: pre-line;
            padding: 40px;
        }

        .sermon-slide {
            max-width: 100%; max-height: 90vh; object-fit: contain;
        }

        #licenseDisplay {
            position: absolute;
            bottom: 20px; right: 30px;
            font-size: 1rem;
            color: rgba(255,255,255,0.6);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #licenseDisplay.visible { opacity: 1; }

        #keyboardHelp {
            position: absolute;
            bottom: 20px; left: 30px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.4);
            z-index: 100;
            transition: opacity 1s;
        }

        #statusMsg {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            color: rgba(255,255,255,0.3);
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="displayContainer">
    <div id="backgroundLayer"></div>
    <div id="logoLayer"></div>
    <div id="contentLayer"></div>
    <div id="licenseDisplay"></div>
    <div id="keyboardHelp">T = toggle background &nbsp;|&nbsp; L = toggle logo &nbsp;|&nbsp; B = blank</div>
    <div id="statusMsg">FOH — Waiting for content…</div>
</div>

<script>
    let currentBackground = null;
    let currentLogo = null;
    let backgroundVisible = false;
    let logoVisible = false;
    let fadeTime = 500;
    let enableSongFade = false;
    let licenseTimer = null;

    // ── Receive messages from the control window ──
    window.addEventListener('message', (event) => {
        const data = event.data;
        if (!data || !data.type) return;

        switch (data.type) {
            case 'init':
                fadeTime = data.fadeTime || 500;
                enableSongFade = data.enableSongFade || false;
                document.getElementById('statusMsg').textContent = 'FOH — Live';
                break;

            case 'display':
                displayContent(data.content, data.typography, data.fadeTime, data.enableSongFade);
                break;

            case 'setBackground':
                currentBackground = data.url;
                break;

            case 'setLogo':
                currentLogo = data.url;
                break;
        }
    });

    // ── Keyboard controls ──
    document.addEventListener('keydown', (e) => {
        switch(e.key.toLowerCase()) {
            case 't': toggleBackground(); break;
            case 'l': toggleLogo(); break;
            case 'b': displayContent({ type: 'blank' }); break;
        }
    });

    function toggleBackground() {
        const bgLayer = document.getElementById('backgroundLayer');
        if (backgroundVisible) {
            bgLayer.classList.remove('visible');
            backgroundVisible = false;
        } else if (currentBackground) {
            const isVideo = currentBackground.match(/\.mp4/i);
            bgLayer.innerHTML = isVideo
                ? `<video autoplay loop muted playsinline><source src="${currentBackground}" type="video/mp4"></video>`
                : `<img src="${currentBackground}" alt="Background">`;
            bgLayer.classList.add('visible');
            backgroundVisible = true;
        }
    }

    function toggleLogo() {
        const logoLayer = document.getElementById('logoLayer');
        if (logoVisible) {
            logoLayer.classList.remove('visible');
            logoVisible = false;
        } else if (currentLogo) {
            logoLayer.innerHTML = `<img src="${currentLogo}" alt="Logo">`;
            logoLayer.classList.add('visible');
            logoVisible = true;
        }
    }

    function displayContent(content, typography, customFadeTime, customSongFade) {
        const contentLayer = document.getElementById('contentLayer');
        const licenseDisplay = document.getElementById('licenseDisplay');
        const statusMsg = document.getElementById('statusMsg');

        // Use per-message fade settings if provided, otherwise use stored
        const ft = (customFadeTime !== undefined) ? customFadeTime : fadeTime;

        // Hide status once we receive real content
        statusMsg.style.opacity = '0';

        // Fade out existing content
        contentLayer.style.transition = `opacity ${ft}ms ease-in-out`;
        contentLayer.classList.remove('visible');

        setTimeout(() => {
            if (content.type === 'blank') {
                contentLayer.innerHTML = '';
                licenseDisplay.classList.remove('visible');
            } else if (content.type === 'lyrics') {
                // Apply typography from control window
                const t = typography || {};
                const style = [
                    `font-family: ${t.fontFamily || "'Segoe UI', sans-serif"}`,
                    `font-weight: ${t.fontWeight || 700}`,
                    `font-size: ${t.fontSize || 64}px`,
                    `color: ${t.textColor || '#ffffff'}`,
                    `text-shadow: ${t.textShadow || '2px 2px 4px rgba(0,0,0,0.8)'}`,
                    `text-align: ${t.textAlign || 'center'}`,
                    `line-height: ${((t.lineHeight || 140) / 100)}`
                ].join(';');

                contentLayer.innerHTML = `<div class="lyrics-text" style="${style}">${escapeHtml(content.text)}</div>`;

                // Show license briefly
                if (content.license) {
                    clearTimeout(licenseTimer);
                    licenseDisplay.textContent = content.license;
                    licenseDisplay.classList.add('visible');
                    licenseTimer = setTimeout(() => licenseDisplay.classList.remove('visible'), 5000);
                }
            } else if (content.type === 'sermon') {
                contentLayer.innerHTML = `<img src="${content.url}" class="sermon-slide" alt="Sermon Slide">`;
            }

            // Fade in
            contentLayer.classList.add('visible');
        }, ft);
    }

    function escapeHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    // Hide keyboard help after 8 seconds
    setTimeout(() => {
        document.getElementById('keyboardHelp').style.opacity = '0';
    }, 8000);

    // Notify opener that FOH is ready
    if (window.opener) {
        window.opener.postMessage({ type: 'fohReady' }, '*');
    }
</script>
</body>
</html>
