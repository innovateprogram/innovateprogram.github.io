<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Anna &amp; Kai</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nav-h: 72px;
      --nav-r: 36px;
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: #090909;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Animated mesh background (visible through loading screen) ─── */
    #meshBg {
      position: fixed; inset: 0; z-index: 0;
      background: #090909;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.55;
      will-change: transform;
    }
    .orb1 {
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, #1a6fff 0%, transparent 70%);
      top: -15%; left: -10%;
      animation: drift1 14s ease-in-out infinite alternate;
    }
    .orb2 {
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, #9b30d9 0%, transparent 70%);
      bottom: 5%; right: -8%;
      animation: drift2 17s ease-in-out infinite alternate;
    }
    .orb3 {
      width: 40vw; height: 40vw;
      background: radial-gradient(circle, #ff4060 0%, transparent 70%);
      top: 40%; left: 30%;
      opacity: 0.25;
      animation: drift3 20s ease-in-out infinite alternate;
    }
    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(8vw, 6vh) scale(1.12); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-6vw, -8vh) scale(1.08); } }
    @keyframes drift3 { from { transform: translate(0,0) scale(1); } to { transform: translate(5vw, -5vh) scale(0.9); } }

    /* ─── Iframes ─── */
    #iframeWrap { position: fixed; inset: 0; z-index: 1; }

    iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      /* Instant: no transition — we handle it in JS with rAF */
      transform: scale(0.97) translateY(6px);
      will-change: opacity, transform;
    }
    iframe.active {
      opacity: 1;
      pointer-events: all;
      transform: scale(1) translateY(0);
    }
    iframe.animating-in {
      transition: opacity 0.28s var(--ease-out), transform 0.32s var(--spring);
    }
    iframe.animating-out {
      transition: opacity 0.18s var(--ease-out), transform 0.18s var(--ease-out);
    }

    /* ─── SVG filter for liquid glass refraction ─── */
    #glassFilters { position: absolute; width: 0; height: 0; overflow: hidden; }

    /* ─── Floating nav ─── */
    #floatingNav {
      position: fixed;
      bottom: max(24px, env(safe-area-inset-bottom, 16px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      height: var(--nav-h);
      display: inline-flex;
      align-items: center;
      padding: 0 8px;
      gap: 0;

      /* Liquid glass base */
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.18) 0%,
        rgba(255,255,255,0.06) 50%,
        rgba(255,255,255,0.12) 100%
      );
      backdrop-filter: saturate(200%) blur(40px) brightness(1.1);
      -webkit-backdrop-filter: saturate(200%) blur(40px) brightness(1.1);
      border-radius: var(--nav-r);

      /* Layered glass borders — top specular + outer rim */
      border: 1px solid rgba(255,255,255,0.22);
      outline: 1px solid rgba(255,255,255,0.06);
      outline-offset: -2px;

      /* Soft shadow + coloured glow that shifts with active tab */
      box-shadow:
        0 2px 0 rgba(255,255,255,0.28) inset,           /* top specular */
        0 -1px 0 rgba(0,0,0,0.18) inset,                /* bottom inner shadow */
        0 12px 40px rgba(0,0,0,0.45),
        0 4px 12px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.04) inset;

      /* Slide up on load */
      animation: navSlideIn 0.55s var(--spring) 0.1s both;
      will-change: box-shadow;
      transition: box-shadow 0.5s var(--ease-out);
    }

    /* Nav glow shifts colour per active tab */
    #floatingNav.glow-gallery {
      box-shadow:
        0 2px 0 rgba(255,255,255,0.28) inset,
        0 -1px 0 rgba(0,0,0,0.18) inset,
        0 12px 40px rgba(0,0,0,0.45),
        0 4px 12px rgba(0,0,0,0.3),
        0 0 60px rgba(0,122,255,0.22),
        0 0 0 1px rgba(255,255,255,0.04) inset;
    }
    #floatingNav.glow-journal {
      box-shadow:
        0 2px 0 rgba(255,255,255,0.28) inset,
        0 -1px 0 rgba(0,0,0,0.18) inset,
        0 12px 40px rgba(0,0,0,0.45),
        0 4px 12px rgba(0,0,0,0.3),
        0 0 60px rgba(175,82,222,0.22),
        0 0 0 1px rgba(255,255,255,0.04) inset;
    }

    @keyframes navSlideIn {
      from { opacity: 0; transform: translateX(-50%) translateY(20px) scale(0.94); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0)    scale(1);    }
    }

    /* ─── Sliding active pill ─── */
    #activePill {
      position: absolute;
      top: 8px; bottom: 8px;
      border-radius: 26px;
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.28) 0%,
        rgba(255,255,255,0.10) 100%
      );
      border: 1px solid rgba(255,255,255,0.30);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.4) inset,
        0 2px 12px rgba(0,0,0,0.25);
      /* Liquid spring slide */
      transition: left 0.38s var(--spring), width 0.38s var(--spring), background 0.3s ease;
      pointer-events: none;
      will-change: left, width;
    }

    /* ─── Tab buttons ─── */
    .nav-tab {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      padding: 0 22px;
      height: var(--nav-h);
      border: none; background: none; cursor: pointer;
      border-radius: 26px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s var(--spring);
    }
    .nav-tab:active { transform: scale(0.92); }

    .tab-icon {
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.35s var(--spring);
    }
    /* ─── Adaptive colour tokens (flipped by JS luminance check) ─── */
    :root {
      --fg:          rgba(255,255,255,0.95);
      --fg-dim:      rgba(255,255,255,0.42);
      --fg-glow:     rgba(255,255,255,0.6);
      --dot-gallery: #5db0ff;
      --dot-journal: #d48fff;
    }
    /* Light-background theme — applied to #floatingNav when bg is bright */
    #floatingNav.theme-light {
      --fg:          rgba(0,0,0,0.88);
      --fg-dim:      rgba(0,0,0,0.38);
      --fg-glow:     rgba(0,0,0,0.25);
      --dot-gallery: #007aff;
      --dot-journal: #9b30d9;
    }
    /* Smooth crossfade for the colour swap */
    #floatingNav {
      --theme-dur: 0.35s;
    }

    .nav-tab svg {
      width: 22px; height: 22px;
      stroke: var(--fg-dim);
      transition: stroke var(--theme-dur) ease, filter var(--theme-dur) ease;
    }
    .nav-tab.active svg {
      stroke: var(--fg);
      filter: drop-shadow(0 0 6px var(--fg-glow));
    }
    .nav-tab.active .tab-icon {
      transform: scale(1.15) translateY(-1px);
    }

    .tab-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--fg-dim);
      transition: color var(--theme-dur) ease;
      white-space: nowrap;
    }
    .nav-tab.active .tab-label {
      color: var(--fg);
    }

    /* Indicator dot */
    .tab-dot {
      position: absolute; bottom: 8px; left: 50%;
      transform: translateX(-50%) scale(0);
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--fg);
      transition: transform 0.3s var(--spring), background 0.25s ease, opacity 0.25s ease;
      opacity: 0;
    }
    .nav-tab.active .tab-dot {
      transform: translateX(-50%) scale(1);
      opacity: 0.8;
    }
    #tabGallery.active .tab-dot { background: var(--dot-gallery); }
    #tabJournal.active .tab-dot { background: var(--dot-journal); }

    /* Also adapt the nav border/bg slightly in light mode */
    #floatingNav.theme-light {
      background: linear-gradient(
        135deg,
        rgba(255,255,255,0.55) 0%,
        rgba(255,255,255,0.30) 50%,
        rgba(255,255,255,0.45) 100%
      );
      border-color: rgba(0,0,0,0.10);
    }
    #floatingNav.theme-light #activePill {
      background: linear-gradient(135deg, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.04) 100%);
      border-color: rgba(0,0,0,0.12);
    }
    #floatingNav.theme-light .nav-divider {
      background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.15), transparent);
    }

    /* Divider */
    .nav-divider {
      position: relative; z-index: 2;
      width: 0.5px; height: 28px; flex-shrink: 0;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.2), transparent);
      transition: opacity 0.3s ease;
    }

    /* ─── Loading screen ─── */
    #loadingScreen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      pointer-events: none;
      transition: opacity 0.5s var(--ease-out), transform 0.5s var(--ease-out);
    }
    #loadingScreen.hidden {
      opacity: 0;
      transform: scale(1.04);
    }

    .load-icon-wrap {
      position: relative;
      width: 80px; height: 80px;
    }
    .load-icon {
      width: 80px; height: 80px;
      border-radius: 22px;
      background: linear-gradient(145deg, #1a6fff, #9b30d9);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 12px 40px rgba(26,111,255,0.4), 0 4px 12px rgba(0,0,0,0.3);
      animation: iconPulse 2.2s ease-in-out infinite;
    }
    .load-icon svg { width: 38px; height: 38px; fill: white; }

    /* Orbiting ring */
    .load-ring {
      position: absolute; inset: -10px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      border-top-color: rgba(255,255,255,0.6);
      border-right-color: rgba(255,255,255,0.2);
      animation: spin 1.2s linear infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 12px 40px rgba(26,111,255,0.4), 0 4px 12px rgba(0,0,0,0.3); transform: scale(1); }
      50%       { box-shadow: 0 16px 56px rgba(155,48,217,0.5), 0 4px 16px rgba(0,0,0,0.35); transform: scale(1.03); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .load-title {
      font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
      animation: fadeUpIn 0.6s var(--ease-out) 0.15s both;
    }
    .load-sub {
      font-size: 14px; color: rgba(255,255,255,0.5);
      animation: fadeUpIn 0.6s var(--ease-out) 0.25s both;
    }
    @keyframes fadeUpIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Shimmer dots */
    .load-dots {
      display: flex; gap: 6px;
      animation: fadeUpIn 0.6s var(--ease-out) 0.35s both;
    }
    .load-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.35);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .load-dot:nth-child(2) { animation-delay: 0.15s; }
    .load-dot:nth-child(3) { animation-delay: 0.3s;  }
    @keyframes dotPulse {
      0%, 100% { transform: scale(1); opacity: 0.35; }
      50%       { transform: scale(1.4); opacity: 0.9; background: #fff; }
    }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

<!-- SVG filters for glass distortion -->
<svg id="glassFilters" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glass-distort" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- Animated mesh background -->
<div id="meshBg">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- Iframes — load both immediately for instant switching -->
<div id="iframeWrap">
  <iframe
    id="frameGallery"
    src="https://innovateprogram.github.io/memories/gallery"
    title="Gallery"
    allow="camera; microphone; clipboard-read; clipboard-write"
    importance="high"
  ></iframe>
  <iframe
    id="frameJournal"
    src="https://innovateprogram.github.io/memories/journal"
    title="Journal"
    allow="camera; microphone; clipboard-read; clipboard-write"
    importance="high"
  ></iframe>
</div>

<!-- Floating liquid glass nav -->
<nav id="floatingNav" class="glow-gallery" role="navigation" aria-label="Main navigation">
  <!-- Sliding active pill (positioned by JS) -->
  <div id="activePill"></div>

  <button class="nav-tab active" id="tabGallery" aria-label="Gallery" aria-selected="true">
    <div class="tab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2.5"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
    </div>
    <span class="tab-label">Gallery</span>
    <span class="tab-dot"></span>
  </button>

  <div class="nav-divider"></div>

  <button class="nav-tab" id="tabJournal" aria-label="Journal" aria-selected="false">
    <div class="tab-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <line x1="10" y1="9" x2="8" y2="9"/>
      </svg>
    </div>
    <span class="tab-label">Journal</span>
    <span class="tab-dot"></span>
  </button>
</nav>

<!-- Loading screen (sits on top until gallery iframe fires load) -->
<div id="loadingScreen">
  <div class="load-icon-wrap">
    <div class="load-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    </div>
    <div class="load-ring"></div>
  </div>
  <div class="load-title">Anna &amp; Kai</div>
  <div class="load-sub">Loading your memories…</div>
  <div class="load-dots">
    <div class="load-dot"></div>
    <div class="load-dot"></div>
    <div class="load-dot"></div>
  </div>
</div>

<script>
  const nav    = document.getElementById('floatingNav');
  const pill   = document.getElementById('activePill');
  const loader = document.getElementById('loadingScreen');

  const tabDefs = [
    { key: 'gallery', btn: document.getElementById('tabGallery'), frame: document.getElementById('frameGallery'), glow: 'glow-gallery' },
    { key: 'journal', btn: document.getElementById('tabJournal'), frame: document.getElementById('frameJournal'), glow: 'glow-journal' },
  ];

  let activeKey = 'gallery';
  let pillReady = false;

  // ── Position the sliding pill under the active tab ──────────────────
  function positionPill(btn, animate) {
    const navRect = nav.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();
    const left  = btnRect.left  - navRect.left;
    const width = btnRect.width;

    if (!animate) {
      pill.style.transition = 'none';
      requestAnimationFrame(() => {
        pill.style.left  = left + 'px';
        pill.style.width = width + 'px';
        requestAnimationFrame(() => {
          pill.style.transition = '';
          pillReady = true;
        });
      });
    } else {
      pill.style.left  = left + 'px';
      pill.style.width = width + 'px';
    }
  }

  // ── Switch tabs with crossfade ───────────────────────────────────────
  function switchTab(key) {
    if (key === activeKey) return;

    const prev = tabDefs.find(t => t.key === activeKey);
    const next = tabDefs.find(t => t.key === key);
    activeKey = key;

    // Outgoing iframe
    prev.frame.classList.add('animating-out');
    prev.frame.classList.remove('active');
    prev.btn.classList.remove('active');
    prev.btn.setAttribute('aria-selected', 'false');
    setTimeout(() => prev.frame.classList.remove('animating-out'), 200);

    // Incoming iframe — tiny rAF delay so browser paints the out-state first
    requestAnimationFrame(() => {
      next.frame.classList.add('animating-in');
      next.frame.classList.add('active');
      next.btn.classList.add('active');
      next.btn.setAttribute('aria-selected', 'true');
      setTimeout(() => next.frame.classList.remove('animating-in'), 380);
    });

    // Move pill
    positionPill(next.btn, true);

    // Update nav glow
    nav.classList.remove('glow-gallery', 'glow-journal');
    nav.classList.add(next.glow);

    // Fade divider if pill passes over it
    document.querySelector('.nav-divider').style.opacity =
      key === 'gallery' ? '1' : '0.4';
  }

  // ── Wire up click handlers ───────────────────────────────────────────
  tabDefs.forEach(({ key, btn }) => {
    btn.addEventListener('click', () => switchTab(key));
    btn.addEventListener('touchstart', () => {}, { passive: true }); // prime touch
  });

  // ── Initial pill position (after layout settles) ─────────────────────
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const activeBtn = tabDefs.find(t => t.key === activeKey).btn;
      positionPill(activeBtn, false);

      // Show gallery frame immediately (it starts loading)
      const galleryFrame = document.getElementById('frameGallery');
      galleryFrame.classList.add('animating-in');
      galleryFrame.classList.add('active');
      setTimeout(() => galleryFrame.classList.remove('animating-in'), 400);
    });
  });

  // ── Re-position pill on resize ───────────────────────────────────────
  window.addEventListener('resize', () => {
    const activeBtn = tabDefs.find(t => t.key === activeKey).btn;
    positionPill(activeBtn, false);
  });

  // ── Hide loader once gallery iframe fires load ────────────────────────
  let loaderGone = false;
  function hideLoader() {
    if (loaderGone) return;
    loaderGone = true;
    loader.classList.add('hidden');
    setTimeout(() => { loader.style.display = 'none'; }, 600);
  }

  document.getElementById('frameGallery').addEventListener('load', () => {
    setTimeout(hideLoader, 200);
  });
  // Failsafe: hide after 7s no matter what
  setTimeout(hideLoader, 7000);

  // ── Adaptive nav theme (dark text on light bg, white text on dark bg) ─
  //
  // Strategy: since iframes are cross-origin we can't read their pixels.
  // Instead we use TWO signals combined:
  //   1. A hidden canvas samples the *mesh background* behind the nav.
  //      When an iframe is visible and opaque it hides the mesh — so if
  //      the mesh reads as dark (because the iframe is covering it) we
  //      fall back to signal 2.
  //   2. The iframe pages call window.parent.postMessage({ bgLuminance: 0..1 })
  //      whenever their background colour changes (we add this to gallery/journal).
  //      Until a message arrives we use a sensible default per tab.
  //
  // Luminance > 0.55  →  light background  →  dark text
  // Luminance ≤ 0.55  →  dark background   →  white text

  const canvas = document.createElement('canvas');
  canvas.width  = 80;   // sample width behind nav
  canvas.height = 1;    // just one horizontal strip
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  // Per-tab last-known luminance from postMessage (null = not received yet)
  const tabLuminance = { gallery: null, journal: null };

  // Defaults: gallery shows white app (light), journal shows white app (light)
  // We start conservative (assume light) so text is dark by default once loaded
  const tabDefaults  = { gallery: 0.85, journal: 0.85 };

  let currentTheme = 'dark'; // 'dark' | 'light'
  let themeFlipTimer = null;

  function applyTheme(lum) {
    const desired = lum > 0.55 ? 'light' : 'dark';
    if (desired === currentTheme) return;

    // Debounce rapid flickers by 80ms
    clearTimeout(themeFlipTimer);
    themeFlipTimer = setTimeout(() => {
      currentTheme = desired;
      nav.classList.toggle('theme-light', desired === 'light');
    }, 80);
  }

  function sampleMeshLuminance() {
    // Draw a 80×1 strip of the mesh background at the nav's vertical center
    const navRect = nav.getBoundingClientRect();
    const y = navRect.top + navRect.height / 2;
    const x = navRect.left;
    const w = navRect.width;

    // We can only read from elements we own — use the meshBg canvas trick
    // by rendering the body background into an offscreen canvas
    // (works because meshBg is in our origin)
    try {
      // Draw the mesh orbs area into our tiny canvas
      // This is approximate — we use getComputedStyle of body as fallback
      const bodyBg = getComputedStyle(document.body).backgroundColor;
      ctx.fillStyle = bodyBg || '#090909';
      ctx.fillRect(0, 0, 80, 1);
      const d = ctx.getImageData(0, 0, 1, 1).data;
      return (0.2126 * d[0] + 0.7152 * d[1] + 0.0722 * d[2]) / 255;
    } catch(e) {
      return 0; // assume dark on any error
    }
  }

  // Listen for luminance reports from the iframe pages
  window.addEventListener('message', e => {
    if (!e.data || typeof e.data.bgLuminance !== 'number') return;
    if (typeof e.data.tab === 'string') {
      tabLuminance[e.data.tab] = e.data.bgLuminance;
    }
    // Apply immediately if it's the active tab reporting
    if (e.data.tab === activeKey || e.data.tab === undefined) {
      applyTheme(e.data.bgLuminance);
    }
  });

  // Poll loop — runs ~10fps (no need for 60fps, just smooth enough)
  function luminancePoll() {
    // Use postMessage luminance if we have it for the active tab
    const reported = tabLuminance[activeKey];
    if (reported !== null) {
      applyTheme(reported);
    } else {
      // Fall back to default for this tab (light pages = white background)
      applyTheme(tabDefaults[activeKey]);
    }
    setTimeout(luminancePoll, 100);
  }
  luminancePoll();

  // When switching tabs, immediately apply that tab's known luminance
  const _origSwitch = switchTab;
  // Patch switchTab to also update theme on tab change
  // (re-declared below, original is already wired to buttons)
  function switchTabWithTheme(key) {
    _origSwitch(key);
    const lum = tabLuminance[key];
    applyTheme(lum !== null ? lum : tabDefaults[key]);
  }
  // Re-wire buttons to use patched version
  tabDefs.forEach(({ key, btn }) => {
    btn.onclick = () => switchTabWithTheme(key);
  });
  document.addEventListener('keydown', e => {
    if (e.key === '1') switchTabWithTheme('gallery');
    if (e.key === '2') switchTabWithTheme('journal');
  });
</script>
</body>
</html>
