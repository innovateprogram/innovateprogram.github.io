<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Quiz</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#f4f4f4;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
    }

    .quiz-box{
        background:white;
        width:700px;
        max-width:90%;
        padding:30px;
        border-radius:15px;
        box-shadow:0 4px 15px rgba(0,0,0,0.15);
        text-align:center;
    }

    h1{
        margin-bottom:20px;
    }

    #question{
        font-size:22px;
        margin-bottom:20px;
    }

    input{
        width:90%;
        padding:12px;
        font-size:18px;
        border-radius:8px;
        border:1px solid #ccc;
    }

    button{
        margin-top:20px;
        padding:12px 25px;
        font-size:18px;
        border:none;
        border-radius:8px;
        background:#2563eb;
        color:white;
        cursor:pointer;
    }

    button:hover{
        background:#1d4ed8;
    }

    #feedback{
        margin-top:20px;
        font-size:20px;
    }

    .correct{
        color:green;
    }

    .wrong{
        color:red;
    }

    #score{
        margin-top:20px;
        font-size:22px;
        font-weight:bold;
    }
</style>
</head>
<body>

<div class="quiz-box">

    <h1>Science Revision Quiz</h1>

    <div id="question"></div>

    <input type="text" id="answer" placeholder="Type your answer here">

    <br>

    <button id="submitBtn" onclick="submitAnswer()">
        Submit
    </button>

    <button id="nextBtn" onclick="nextQuestion()" style="display:none;">
        Next Question
    </button>

    <div id="feedback"></div>

    <div id="score"></div>

</div>

<script>

const questions = [

{
    question: "What process changes liquid water into water vapour?",
    answers: ["evaporation"]
},

{
    question: "Name one of the four global Earth systems.",
    answers: ["atmosphere","hydrosphere","biosphere","geosphere","lithosphere"]
},

{
    question: "What gas do plants take in during photosynthesis?",
    answers: ["carbon dioxide","co2"]
},

{
    question: "What is the main purpose of respiration?",
    answers: ["release energy","produce energy","get energy"]
},

{
    question: "What is an ecosystem?",
    answers: ["living things and environment","organisms and environment"]
},

{
    question: "Which subatomic particle has a positive charge?",
    answers: ["proton","protons"]
},

{
    question: "What is the atomic number?",
    answers: ["number of protons","amount of protons"]
},

{
    question: "What is an ion?",
    answers: ["charged atom","atom with charge"]
},

{
    question: "What are isotopes?",
    answers: ["same protons different neutrons","different neutrons"]
},

{
    question: "What happens during radiation?",
    answers: ["energy released","particles released","waves released"]
},

{
    question: "What is the distance between wave crests called?",
    answers: ["wavelength"]
},

{
    question: "What happens when a wave reflects?",
    answers: ["bounces back","changes direction"]
},

{
    question: "Which colour has the longest wavelength?",
    answers: ["red"]
},

{
    question: "Why does an object appear green?",
    answers: ["reflects green light","green light reflected"]
},

{
    question: "What usually happens to brightness when light intensity increases?",
    answers: ["gets brighter","brightness increases","brighter"]
}

];

let currentQuestion = 0;
let score = 0;

const questionEl = document.getElementById("question");
const answerEl = document.getElementById("answer");
const feedbackEl = document.getElementById("feedback");
const scoreEl = document.getElementById("score");
const submitBtn = document.getElementById("submitBtn");
const nextBtn = document.getElementById("nextBtn");

function loadQuestion(){

    if(currentQuestion >= questions.length){

        let percent =
        Math.round((score / questions.length) * 100);

        questionEl.innerHTML = "Quiz Complete!";

        answerEl.style.display = "none";
        submitBtn.style.display = "none";
        nextBtn.style.display = "none";

        feedbackEl.innerHTML =
        `Final Score: ${score}/${questions.length} (${percent}%)`;

        if(percent >= 50){

            scoreEl.innerHTML =
            "<span class='correct'>PASS</span>";

        }else{

            scoreEl.innerHTML =
            "<span class='wrong'>FAIL - Try Again</span>";
        }

        return;
    }

    questionEl.innerHTML =
    `Question ${currentQuestion + 1}:<br><br>` +
    questions[currentQuestion].question;

    answerEl.value = "";

    feedbackEl.innerHTML = "";

    answerEl.disabled = false;

    submitBtn.style.display = "inline-block";

    nextBtn.style.display = "none";
}

function submitAnswer(){

    let userAnswer =
    answerEl.value.toLowerCase().trim();

    let correctAnswers =
    questions[currentQuestion].answers;

    let correct =
    correctAnswers.some(answer =>
        userAnswer.includes(answer)
    );

    if(correct){

        score++;

        feedbackEl.innerHTML =
        `<span class="correct">
        Correct!
        </span>`;

    }else{

        feedbackEl.innerHTML =
        `<span class="wrong">
        Incorrect.<br>
        Correct answer: ${correctAnswers[0]}
        </span>`;
    }

    answerEl.disabled = true;

    submitBtn.style.display = "none";

    nextBtn.style.display = "inline-block";
}

function nextQuestion(){

    currentQuestion++;

    loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
