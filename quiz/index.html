<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Science Multiple Choice Quiz</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.quiz-box{
    background:white;
    width:700px;
    max-width:90%;
    padding:30px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
}

#question{
    font-size:24px;
    margin-bottom:25px;
}

.option{
    display:block;
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    background:#e5e7eb;
    font-size:18px;
    cursor:pointer;
    text-align:left;
}

.option:hover{
    background:#d1d5db;
}

.correct{
    background:#86efac !important;
}

.wrong{
    background:#fca5a5 !important;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#nextBtn{
    display:none;
}

#score{
    margin-top:20px;
    font-size:22px;
    text-align:center;
    font-weight:bold;
}

</style>
</head>
<body>

<div class="quiz-box">

    <h1>Science Revision Quiz</h1>

    <div id="question"></div>

    <div id="options"></div>

    <button id="nextBtn" onclick="nextQuestion()">
        Next Question
    </button>

    <div id="score"></div>

</div>

<script>

const questions = [

{
    question:"What process changes liquid water into water vapour?",
    options:["Condensation","Evaporation","Precipitation","Freezing"],
    answer:"Evaporation"
},

{
    question:"Which is one of the four global Earth systems?",
    options:["Atmosphere","Galaxy","Universe","Comet"],
    answer:"Atmosphere"
},

{
    question:"What gas do plants take in during photosynthesis?",
    options:["Oxygen","Nitrogen","Carbon Dioxide","Hydrogen"],
    answer:"Carbon Dioxide"
},

{
    question:"Which subatomic particle has a positive charge?",
    options:["Electron","Neutron","Proton","Ion"],
    answer:"Proton"
},

{
    question:"What is the atomic number?",
    options:[
        "Number of electrons",
        "Number of protons",
        "Number of neutrons",
        "Mass of atom"
    ],
    answer:"Number of protons"
},

{
    question:"What is an ion?",
    options:[
        "A neutral atom",
        "A charged atom",
        "A molecule",
        "A wave"
    ],
    answer:"A charged atom"
},

{
    question:"What is the distance between wave crests called?",
    options:["Amplitude","Frequency","Wavelength","Reflection"],
    answer:"Wavelength"
},

{
    question:"Which colour has the longest wavelength?",
    options:["Blue","Green","Red","Purple"],
    answer:"Red"
},

{
    question:"What happens when a wave reflects?",
    options:[
        "It disappears",
        "It speeds up",
        "It bounces back",
        "It stops"
    ],
    answer:"It bounces back"
},

{
    question:"Why does an object appear green?",
    options:[
        "It absorbs green light",
        "It reflects green light",
        "It creates green light",
        "It destroys green light"
    ],
    answer:"It reflects green light"
}

];

let currentQuestion = 0;
let score = 0;

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const scoreEl = document.getElementById("score");

function loadQuestion(){

    nextBtn.style.display = "none";

    let q = questions[currentQuestion];

    questionEl.innerHTML =
    `Question ${currentQuestion + 1}:<br><br>${q.question}`;

    optionsEl.innerHTML = "";

    q.options.forEach(option => {

        const button = document.createElement("button");

        button.innerText = option;

        button.classList.add("option");

        button.onclick = () => selectAnswer(button, option);

        optionsEl.appendChild(button);
    });
}

function selectAnswer(button, selected){

    const q = questions[currentQuestion];

    const buttons =
    document.querySelectorAll(".option");

    buttons.forEach(btn => {

        btn.disabled = true;

        if(btn.innerText === q.answer){
            btn.classList.add("correct");
        }
    });

    if(selected === q.answer){

        score++;

    }else{

        button.classList.add("wrong");
    }

    nextBtn.style.display = "inline-block";
}

function nextQuestion(){

    currentQuestion++;

    if(currentQuestion >= questions.length){

        showResults();

    }else{

        loadQuestion();
    }
}

function showResults(){

    questionEl.innerHTML = "Quiz Complete!";

    optionsEl.innerHTML = "";

    nextBtn.style.display = "none";

    let percent =
    Math.round((score / questions.length) * 100);

    if(percent >= 50){

        scoreEl.innerHTML =
        `Final Score: ${score}/${questions.length}
        (${percent}%)<br><br>
        PASS`;

    }else{

        scoreEl.innerHTML =
        `Final Score: ${score}/${questions.length}
        (${percent}%)<br><br>
        FAIL - Try Again`;
    }
}

loadQuestion();

</script>

</body>
</html>
